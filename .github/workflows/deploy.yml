name: Deploy to Vercel & Railway

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy to environment"
        required: true
        default: "develop"
        type: choice
        options:
          - develop
          - main

permissions:
  contents: read
  deployments: write

jobs:
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'develop' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: |
          echo "🚀 Frontend deployment to Vercel initiated"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo ""
          echo "✅ Vercel auto-deployment is handling this"
          echo "📊 Check deployment status at: https://vercel.com/dashboard"

      - name: Create GitHub Deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'Vercel Frontend',
              description: 'Frontend deployment to Vercel',
              production_environment: '${{ github.ref == 'refs/heads/main' }}'
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'in_progress',
              description: 'Vercel is building and deploying...'
            });

  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'develop' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Railway
        run: |
          echo "🚀 Backend deployment to Railway initiated"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo ""
          echo "✅ Railway auto-deployment is handling this"
          echo "📊 Check deployment status at: https://railway.app/dashboard"

      - name: Create GitHub Deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'Railway Backend',
              description: 'Backend deployment to Railway',
              production_environment: '${{ github.ref == 'refs/heads/main' }}'
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'in_progress',
              description: 'Railway is building and deploying...'
            });

  notify-deployment:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: always()

    steps:
      - name: Send Deployment Notification
        uses: actions/github-script@v7
        with:
          script: |
            const commitMessage = context.payload.head_commit?.message || 'N/A';
            const author = context.actor;
            const branch = context.ref_name;

            const message = `
            🚀 **Deployment Started**

            **Branch**: \`${branch}\`
            **Author**: @${author}
            **Commit**: ${context.sha.substring(0, 7)}
            **Message**: ${commitMessage}

            **Frontend**: Vercel (Auto-deploying)
            **Backend**: Railway (Auto-deploying)

            📊 **Monitor**:
            - [Vercel Dashboard](https://vercel.com/dashboard)
            - [Railway Dashboard](https://railway.app/dashboard)
            `;

            console.log(message);

  verify-deployment:
    name: Verify Deployments
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Wait for deployments
        run: |
          echo "⏳ Waiting for Vercel and Railway to complete deployments..."
          sleep 30

      - name: Health Check Frontend
        run: |
          echo "🔍 Checking frontend health..."
          curl -s -o /dev/null -w "Status: %{http_code}\n" https://lifelink.vercel.app || echo "Frontend not yet available"

      - name: Health Check Backend
        run: |
          echo "🔍 Checking backend health..."
          curl -s -o /dev/null -w "Status: %{http_code}\n" https://lifelink-backend.railway.app/api/health || echo "Backend not yet available"
